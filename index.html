<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <title>Frontend Mentor | Fylo data storage component</title>
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      text-decoration: underline;
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <main class="container">
    <h1 class="visually-hidden">Fylo Data Storage Component</h1>
    <section class="actions" aria-label="Quick Actions">
      <div class="actions__logo">
        <img src="./images/logo.svg" alt="Fylo Logo">
      </div>
      <ul class="actions__list" role="list">
        <li><img src="./images/icon-document.svg" alt="Documents"></li>
        <li><img src="./images/icon-folder.svg" alt="Folders"></li>
        <li><img src="./images/icon-upload.svg" alt="Upload"></li>
      </ul>
    </section>
    <section class="bar" aria-label="Storage Status">
      <p class="bar__text color-light">You’ve used <strong>815 GB</strong> of your storage</p>
      <div class="bar__bg" role="progressbar" aria-valuenow="815" aria-valuemin="0" aria-valuemax="1000"
        aria-label="Storage space used">
        <span class="bar__bg-bar"></span>
      </div>
      <div class="bar__parameter">
        <strong class="color-light">0 GB</strong>
        <strong class="color-light">1000 GB</strong>
      </div>
      <div class="bar__storageleft">
        <p>185</p><span>GB LEFT</span>
      </div>
    </section>
  </main>

  <footer class="attribution color-gray">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/psudo-dev">@psudo-dev</a>.
  </footer>
</body>

</html>
